version: '3.8'

services:
  simple-apps:
    build: .
    container_name: simple-apps
    ports:
      - "8001:8000"
    volumes:
      # Mount apps/ from the data drive so per-app data/ and frontend/dist/
      # dirs persist across rebuilds and are included in backups.
      - /mnt/data/simple-apps/apps:/app/apps
      # Mount the Obsidian notes vault read-only for the file watcher.
      - /mnt/data/nextcloud-appdata/data/phil/files/Notes:/app/notes:ro
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
